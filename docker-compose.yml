services:
  short-creator:
    build:
      context: .
      dockerfile: main.Dockerfile
    env_file:
      - .env # ← This line makes Docker load your PEXELS_API_KEY
    environment:
      # Optional override, can remove DEV if you want .env to control it
      DEV: "true"
    ports:
      - "3123:3123"
    entrypoint: ["node", "dist/index.js"]
